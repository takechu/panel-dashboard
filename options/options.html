<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Panel Dashboard 設定</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #202124;
      background: #f8f9fa;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a73e8;
    }

    main {
      max-width: 720px;
      margin: 32px auto;
      padding: 0 16px;
    }

    section {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e0e0e0;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .section-header {
      padding: 16px 24px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: #202124;
    }

    .section-header p {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }

    .btn {
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: background 0.15s;
    }

    .btn-primary {
      background: #1a73e8;
      color: #fff;
    }

    .btn-primary:hover { background: #1557b0; }

    .btn-secondary {
      background: #f1f3f4;
      color: #444;
    }

    .btn-secondary:hover { background: #e0e0e0; }

    .btn-danger {
      background: #fce8e6;
      color: #c62828;
    }

    .btn-danger:hover { background: #f5c6c3; }

    /* URL Table */

    #url-table-container {
      padding: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 10px 24px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
      text-align: left;
    }

    td {
      padding: 12px 24px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: #fafafa;
    }

    .td-title {
      font-weight: 500;
      max-width: 200px;
    }

    .td-url {
      color: #1a73e8;
      font-size: 12px;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .td-actions {
      display: flex;
      gap: 6px;
      white-space: nowrap;
    }

    .td-actions .btn {
      padding: 5px 10px;
      font-size: 12px;
    }

    #url-empty {
      padding: 40px 24px;
      text-align: center;
      color: #888;
      font-size: 13px;
    }

    /* Edit form */

    #edit-form {
      padding: 20px 24px;
      border-top: 1px solid #e0e0e0;
      background: #fafeff;
      display: none;
    }

    #edit-form.visible {
      display: block;
    }

    #edit-form h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #333;
    }

    .form-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .form-field {
      flex: 1;
    }

    .form-field label {
      display: block;
      font-size: 11px;
      color: #666;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .form-field input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-field input:focus {
      border-color: #1a73e8;
    }

    .form-actions {
      display: flex;
      gap: 8px;
    }
  </style>
</head>
<body>
  <header>
    <svg width="20" height="20" viewBox="0 0 20 20" fill="#1a73e8">
      <rect x="1" y="1" width="8" height="8" rx="1.5"/>
      <rect x="11" y="1" width="8" height="8" rx="1.5"/>
      <rect x="1" y="11" width="8" height="8" rx="1.5"/>
      <rect x="11" y="11" width="8" height="8" rx="1.5"/>
    </svg>
    <h1>Panel Dashboard 設定</h1>
  </header>

  <main>
    <section>
      <div class="section-header">
        <div>
          <h2>保存済みURL ライブラリ</h2>
          <p>ダッシュボードから「ライブラリ」ボタンで素早く追加できます</p>
        </div>
        <button class="btn btn-primary" id="btn-add-url">＋ 追加</button>
      </div>

      <div id="url-table-container">
        <div id="url-empty">URLがまだ登録されていません。「＋ 追加」ボタンで追加してください。</div>
        <table id="url-table" style="display:none">
          <thead>
            <tr>
              <th>タイトル</th>
              <th>URL</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="url-tbody"></tbody>
        </table>
      </div>

      <!-- Inline edit form -->
      <div id="edit-form">
        <h3 id="edit-form-title">URLを追加</h3>
        <div class="form-row">
          <div class="form-field">
            <label>タイトル</label>
            <input id="field-title" type="text" placeholder="マイページ">
          </div>
          <div class="form-field" style="flex:2">
            <label>URL</label>
            <input id="field-url" type="url" placeholder="https://example.com">
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" id="btn-save-url">保存</button>
          <button class="btn btn-secondary" id="btn-cancel-url">キャンセル</button>
        </div>
      </div>
    </section>
  </main>

  <script src="options.js"></script>
</body>
</html>
